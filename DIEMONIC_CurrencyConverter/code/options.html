<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Currency Converter Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="page">
    <h1>Currency Converter</h1>
    <section class="card">
      <h2>Настройки кэша</h2>
      <div class="line">
        <span>Обновлять курсы каждые</span>
        <strong id="ttlValue">-</strong>
      </div>
      <input id="ttlSlider" type="range" min="1" max="600" value="180">
      <div class="line">
        <span>Последняя успешная загрузка</span>
        <strong id="lastUpdate">-</strong>
      </div>
    </section>
    <section class="card">
      <h2>Курсы валют</h2>
      <div id="ratesList" class="rates-list"></div>
    </section>
  </main>
  <script src="universal.js"></script>
</body>
</html>
