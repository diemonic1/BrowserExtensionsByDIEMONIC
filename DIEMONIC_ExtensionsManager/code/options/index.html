<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D!EMONIC | Extension Manager</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="header-block">
        <img class="header-icon" id="headerIcon" src="../icon/v1/48.png" alt="" />
        <div class="header-title">D!EMONIC | Extension Manager</div>
    </header>

    <div class="container">
        <section class="card">
            <h2 id="iconSectionTitle"></h2>

            <div class="icon-grid" id="iconGrid" role="group" aria-labelledby="iconSectionTitle"></div>
        </section>

        <section class="card">
            <div class="section-header">
                <h2 id="groupsSectionTitle"></h2>
                <button type="button" class="icon-btn" id="addGroupBtn">+</button>
            </div>

            <p class="section-hint" id="groupsInstructions"></p>

            <div class="groups-list" id="groupsList"></div>
            <p class="empty-hint hidden" id="groupsEmptyHint"></p>
        </section>
    </div>

    <div class="modal-backdrop hidden" id="confirmBackdrop" aria-hidden="true">
        <div class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
            <h3 id="confirmTitle"></h3>
            <p id="confirmText"></p>
            <div class="confirm-actions">
                <button type="button" class="btn btn-ghost" id="confirmCancelBtn"></button>
                <button type="button" class="btn btn-solid" id="confirmDeleteBtn"></button>
            </div>
        </div>
    </div>

    <script src="options.js"></script>
</body>
</html>
