<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaveAnyVideoBookmark Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="options-shell">
    <section class="options-card">
      <div class="options-heading">
        <p class="eyebrow">Extension Settings</p>
        <h1>SaveAnyVideoBookmark</h1>
        <p class="subtitle">Adjust where bookmarks are saved and how video time is captured.</p>
      </div>

      <form id="settings-form" class="settings-form">
        <label class="field" for="video-offset">
          <span class="field-title">Video offset</span>
          <span class="field-description">Set offset in seconds. When saving a bookmark with a video, subtracts this value from the actual time watched</span>
          <div class="range-row">
            <input id="video-offset" name="videoOffset" type="range" min="0" max="3" step="1" value="0">
            <output id="video-offset-value" for="video-offset">0s</output>
          </div>
        </label>

        <label class="field" for="folder-name">
          <span class="field-title">Bookmark folder</span>
          <span class="field-description">Name of the folder where the bookmark is saved</span>
          <input id="folder-name" name="folderName" type="text" maxlength="120" placeholder="Смотреть" autocomplete="off">
        </label>

        <label class="field" for="toast-left-offset">
          <span class="field-title">Popup notification offset</span>
          <span class="field-description">Left offset for the popup notification. Use a percent value such as 23.8%.</span>
          <input id="toast-left-offset" name="toastLeftOffset" type="text" inputmode="decimal" maxlength="12" placeholder="23.8%" autocomplete="off">
        </label>

        <div class="actions">
          <button id="save-button" type="submit">Save settings</button>
          <span id="status" class="status" aria-live="polite"></span>
        </div>
      </form>
    </section>
  </main>

  <script src="options.js"></script>
</body>
</html>
